<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UEBA Dashboard{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --risk-critical: #ef4444;
            --risk-high: #f97316;
            --risk-medium: #eab308;
            --risk-low: #22c55e;
            --border-color: #1e293b;
            --hover-bg: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar .logo {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }
        .sidebar .logo h1 {
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .sidebar .logo small {
            color: var(--text-secondary);
            font-size: 11px;
            -webkit-text-fill-color: var(--text-secondary);
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            font-size: 14px;
            border-left: 3px solid transparent;
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            background: var(--hover-bg);
            color: var(--text-primary);
            border-left-color: var(--accent-cyan);
        }
        .sidebar nav a i { width: 20px; text-align: center; }
        .sidebar .status-bar {
            position: absolute;
            bottom: 16px;
            left: 20px;
            right: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .sidebar .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--risk-low);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Main Content ── */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 24px 32px;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h2 { font-size: 22px; font-weight: 600; }
        .page-header .subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #334155; }
        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

        /* ── Stats ── */
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .stat-change { font-size: 12px; margin-top: 6px; }
        .stat-change.up { color: var(--risk-low); }
        .stat-change.down { color: var(--risk-critical); }

        /* ── Level Badges ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-critical { background: rgba(239,68,68,0.15); color: var(--risk-critical); }
        .badge-high { background: rgba(249,115,22,0.15); color: var(--risk-high); }
        .badge-medium { background: rgba(234,179,8,0.15); color: var(--risk-medium); }
        .badge-low { background: rgba(34,197,94,0.15); color: var(--risk-low); }
        .badge-info { background: rgba(148,163,184,0.15); color: var(--text-secondary); }

        /* ── Tables ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); }

        /* ── Button ── */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
            cursor: pointer; border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent-cyan); color: #000; }
        .btn-primary:hover { background: #0891b2; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* ── MITRE Matrix ── */
        .mitre-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .mitre-cell {
            padding: 10px 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .mitre-cell:hover { transform: scale(1.05); }
        .mitre-cell .tactic-id { font-size: 10px; opacity: 0.7; }

        /* ── Animations ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar .logo h1, .sidebar .logo small,
            .sidebar nav a span, .sidebar .status-bar { display: none; }
            .sidebar nav a { justify-content: center; padding: 12px; }
            .main { margin-left: 60px; padding: 16px; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <h1>UEBA</h1>
            <small>User & Entity Behavior Analytics</small>
        </div>
        <nav>
            <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">
                <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
            </a>
            <a href="/alerts" class="{% if request.url.path == '/alerts' %}active{% endif %}">
                <i class="fas fa-bell"></i> <span>Alerts</span>
            </a>
            <a href="/analytics" class="{% if request.url.path == '/analytics' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> <span>Analytics</span>
            </a>
            <a href="/mitre" class="{% if request.url.path == '/mitre' %}active{% endif %}">
                <i class="fas fa-shield-alt"></i> <span>MITRE ATT&CK</span>
            </a>
            <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">
                <i class="fas fa-cog"></i> <span>Settings</span>
            </a>
        </nav>
        <div class="status-bar">
            <span class="status-dot"></span>
            <span id="systemStatus">System Ready</span>
        </div>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script>
        // ─── Auto-refresh data every 10 seconds ───
        const REFRESH_INTERVAL = 10000;

        // ─── Helper: fetch JSON ───
        async function apiFetch(url, options = {}) {
            try {
                const res = await fetch(url, options);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error(`API Error [${url}]:`, err);
                return null;
            }
        }

        // ─── Helper: Risk level badge ───
        function riskBadge(level) {
            const map = {
                'critical': 'badge-critical',
                'high': 'badge-high',
                'medium': 'badge-medium',
                'low': 'badge-low',
                'info': 'badge-info',
            };
            return `<span class="badge ${map[level] || 'badge-info'}">${level}</span>`;
        }

        // ─── Format timestamp ───
        function fmtTime(ts) {
            if (!ts) return '-';
            try {
                return new Date(ts).toLocaleString();
            } catch { return ts; }
        }

        // ─── Number formatting ───
        function fmtNum(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
