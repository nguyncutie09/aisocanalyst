version: "3.9"

services:
  ueba:
    build: .
    container_name: ueba-system
    ports:
      - "8000:8000"
    volumes:
      - ueba_data:/app/data
      - ueba_models:/app/data/models
    environment:
      - APP_VERSION=2.0.0
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - ANOMALY_THRESHOLD=0.7
      - RISK_CRITICAL_THRESHOLD=85
      - RISK_HIGH_THRESHOLD=65
      - RISK_MEDIUM_THRESHOLD=40
      - RISK_LOW_THRESHOLD=20
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ueba_data:
  ueba_models:
