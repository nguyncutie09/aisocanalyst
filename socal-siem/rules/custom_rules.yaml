rules:
  # ============================================================
  # SSH BRUTE FORCE DETECTION
  # ============================================================
  - id: "SSH_BRUTE_FORCE"
    name: "SSH Brute Force Attack"
    severity: "high"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0006"      # Credential Access
      technique: "T1110"    # Brute Force
    tags: ["ssh", "brute_force", "authentication"]
    conditions:
      match:
        "message": "failed password"
    correlation:
      type: "threshold"
      window_seconds: 300
      count: 5

  # ============================================================
  # SSH FROM EXTERNAL IP
  # ============================================================
  - id: "SSH_EXTERNAL_LOGIN"
    name: "SSH Login From External IP"
    severity: "medium"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0001"      # Initial Access
      technique: "T1190"    # Exploit Public-Facing Application
    tags: ["ssh", "external", "authentication"]
    conditions:
      match:
        "message": "Accepted password"
        "tags": "ssh_login"
    correlation:
      type: "single"

  # ============================================================
  # PRIVILEGE ESCALATION - SUDO
  # ============================================================
  - id: "PRIVILEGE_ESCALATION_SUDO"
    name: "Privilege Escalation via Sudo"
    severity: "high"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0004"      # Privilege Escalation
      technique: "T1548"    # Abuse Elevation Control Mechanism
    tags: ["privilege", "sudo", "escalation"]
    conditions:
      match:
        "tags": "privilege_escalation"
    correlation:
      type: "single"

  # ============================================================
  # LATERAL MOVEMENT - SSH FROM INTERNAL
  # ============================================================
  - id: "LATERAL_MOVEMENT_SSH"
    name: "Potential Lateral Movement via SSH"
    severity: "critical"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0008"      # Lateral Movement
      technique: "T1021"    # Remote Services
    tags: ["lateral_movement", "ssh"]
    conditions:
      correlation:
        type: "sequence"
        window_seconds: 60
        sequence:
          - "tags": "login_success"
          - "tags": "sudo_command"
    match:
      "source": "auditd"

  # ============================================================
  # SURICATA MALWARE ALERT
  # ============================================================
  - id: "SURICATA_MALWARE"
    name: "Suricata Malware Detection"
    severity: "critical"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0002"      # Execution
      technique: "T1204"    # User Execution
    tags: ["malware", "suricata", "network"]
    conditions:
      match:
        "tags": "suricata_alert"
        "tags": "high_priority"
    correlation:
      type: "single"

  # ============================================================
  # DNS QUERY TO SUSPICIOUS DOMAIN
  # ============================================================
  - id: "DNS_SUSPICIOUS"
    name: "DNS Query to Suspicious Domain"
    severity: "medium"
    enabled: true
    group_by: "network.destination_ip"
    mitre:
      tactic: "TA0011"      # Command and Control
      technique: "T1071"    # Application Layer Protocol
    tags: ["dns", "c2", "network"]
    conditions:
      match:
        "source": "suricata"
        "message": "DNS query"
    correlation:
      type: "single"

  # ============================================================
  # WINDOWS LOGON FAILURE BURST
  # ============================================================
  - id: "WINDOWS_LOGON_FAILURE"
    name: "Windows Logon Failure Burst"
    severity: "high"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0006"      # Credential Access
      technique: "T1110"    # Brute Force
    tags: ["windows", "brute_force", "authentication"]
    conditions:
      match:
        "source": "windows_event"
        "tags": "login_failure"
    correlation:
      type: "threshold"
      window_seconds: 300
      count: 10

  # ============================================================
  # SUSPICIOUS PROCESS EXECUTION
  # ============================================================
  - id: "SUSPICIOUS_PROCESS"
    name: "Suspicious Process Execution"
    severity: "high"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0002"      # Execution
      technique: "T1059"    # Command and Scripting Interpreter
    tags: ["process", "execution", "t1059"]
    conditions:
      match:
        "tags": "process"
    correlation:
      type: "single"

  # ============================================================
  # RULE-BASED ML ANOMALY TRIGGER
  # ============================================================
  - id: "ML_ANOMALY_HIGH"
    name: "ML Detected Anomaly (High Score)"
    severity: "medium"
    enabled: true
    group_by: "hostname"
    mitre:
      tactic: "TA0009"      # Collection
      technique: "T1560"    # Archive Collected Data
    tags: ["ml_anomaly", "behavioral"]
    conditions:
      match:
        "source": "ml_engine"
        "severity": "high"
    correlation:
      type: "single"

  # ============================================================
  # WINDOWS NETWORK CONNECTION TO EXTERNAL
  # ============================================================
  - id: "WINDOWS_NETWORK_EXTERNAL"
    name: "Windows Network Connection to External"
    severity: "low"
    enabled: false
    group_by: "hostname"
    mitre:
      tactic: "TA0011"      # Command and Control
      technique: "T1071"    # Application Layer Protocol
    tags: ["windows", "network", "c2"]
    conditions:
      match:
        "event_id": "5156"
    correlation:
      type: "threshold"
      window_seconds: 60
      count: 20
