version: '3.8'

networks:
  socal-net:
    driver: bridge

services:
  # ============================================================
  # MESSAGE QUEUE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: socal-redis
    ports:
      - "6379:6379"
    networks:
      - socal-net
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ============================================================
  # TIME-SERIES DATABASE
  # ============================================================
  timescaledb:
    image: timescale/timescaledb:2-pg16
    container_name: socal-timescaledb
    environment:
      POSTGRES_DB: socal_siem
      POSTGRES_USER: socal
      POSTGRES_PASSWORD: socal_pass
    ports:
      - "5432:5432"
    networks:
      - socal-net
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./storage/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    restart: unless-stopped

  # ============================================================
  # CORE SIEM PIPELINE
  # ============================================================
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socal-pipeline
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_started
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: socal_siem
      DB_USER: socal
      DB_PASS: socal_pass
      OLLAMA_URL: http://ollama:11434
      LLM_MODEL: qwen2.5:7b
      LOG_LEVEL: INFO
    networks:
      - socal-net
    volumes:
      - /var/log:/var/log:ro
      - ./rules:/app/rules
      - ./storage:/app/storage
      - ./collector/test_logs:/app/test_logs
    restart: unless-stopped

  # ============================================================
  # LOCAL LLM (AI SOC ANALYST)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: socal-ollama
    ports:
      - "11434:11434"
    networks:
      - socal-net
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ============================================================
  # DASHBOARD BACKEND (FastAPI)
  # ============================================================
  dashboard-backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: socal-dashboard-backend
    depends_on:
      - timescaledb
      - redis
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: socal_siem
      DB_USER: socal
      DB_PASS: socal_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    networks:
      - socal-net
    restart: unless-stopped

  # ============================================================
  # DASHBOARD FRONTEND (React/Vite)
  # ============================================================
  dashboard-frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: socal-dashboard-frontend
    depends_on:
      - dashboard-backend
    ports:
      - "3000:80"
    networks:
      - socal-net
    restart: unless-stopped

  # ============================================================
  # NGINX REVERSE PROXY (optional)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: socal-nginx
    ports:
      - "8080:80"
    networks:
      - socal-net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard-backend
      - dashboard-frontend
    restart: unless-stopped

volumes:
  redis_data:
  pgdata:
  ollama_data:
